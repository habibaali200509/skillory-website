<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Post a Problem — Craftsmen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style(post&dashboard).css">
<link rel="stylesheet" href="dark-mode.css">
</head>
<body class="dash-body">
<nav class="navbar navbar-expand-lg craft-nav sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <span class="brand-mark"><i class="bi bi-hammer"></i></span>
      <span class="fw-bold">Skillory</span>
    </a>
    <div class="ms-auto d-flex gap-2">
      <a href="category.html" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2"></i> Categories</a>
    </div>
  </div>

<div style="display:flex;gap:10px;align-items:center;margin-left:auto">
  <button id="themeToggle" style="padding:8px 12px;border:none;border-radius:8px;cursor:pointer;">
    🌙 Dark
  </button>

  <div id="google_translate_element" style="display:none"></div>

  <button data-lang-toggle style="padding:8px 12px;border:none;border-radius:8px;cursor:pointer;">
    🌐 <span data-lang-label>AR</span>
  </button>
</div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="profile-card p-4 p-lg-5">
        <div class="text-center mb-4">
          <span class="brand-mark mx-auto mb-3"><i class="bi bi-megaphone"></i></span>
          <h1 class="h3 fw-bold text-navy mb-1">Post a problem</h1>
          <p class="text-muted mb-0">Describe what you need — the right artisan will reach out.</p>
        </div>

        <form id="problemForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Problem title</label>
            <input type="text" class="form-control form-control-lg" name="title" maxlength="100" placeholder="e.g. Leaking kitchen sink" required>
            <div class="invalid-feedback">Please enter a short title.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" name="description" rows="4" maxlength="600" placeholder="What needs to be done? Any timing or constraints?" required></textarea>
            <div class="invalid-feedback">Please add a description.</div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category</label>
              <select class="form-select" name="category" required>
                <option value="">Choose…</option>
                <option>Carpentry</option>
                <option>Plumbing</option>
                <option>Electrical</option>
                <option>Painting</option>
                <option>Masonry</option>
                <option>Cleaning</option>
                <option>Other</option>
              </select>
              <div class="invalid-feedback">Pick a category.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Budget (MAD)</label>
              <div class="input-group">
                <span class="input-group-text">DH</span>
                <input type="number" min="1" step="1" class="form-control" name="budget" placeholder="500" required>
                <div class="invalid-feedback">Enter a budget.</div>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Location</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" class="form-control" name="location" maxlength="80" placeholder="City, neighborhood" required>
                <div class="invalid-feedback">Where is the job?</div>
              </div>
            </div>
          </div>

          <div id="formAlert" class="alert alert-success d-none mt-4 mb-0">
            <i class="bi bi-check-circle-fill"></i> Problem posted! Redirecting to dashboard…
          </div>

          <div class="d-flex gap-2 mt-4">
            <a href="artisan-dashboard.html" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-craft ms-auto px-4">
              <i class="bi bi-send"></i> Submit problem
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<footer class="craft-footer text-center py-3">
  <small>© <span id="yr"></span> Craftsmen</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script(post&dashboard).js"></script>
<script src="theme.js"></script>

<script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
